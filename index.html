<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Franz Rembart — Consulting Partner · Professor · Mathematician</title>
<meta name="description" content="Franz Rembart — Partner at BCG, Associate Professor of Statistics at Columbia, mathematician.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #EDE4D3;
    --ink: #1A1D24;
    --ink-soft: #2A2E38;
    --body: #3A3D46;
    --muted: #6B665D;
    --gold: #9C8558;
    --gold-text: #7B6030;
    --gold-bright: #C9A96B;
    --rule: #C9BFA8;
    --navy: #12151C;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; }
  body {
    background: var(--cream);
    color: var(--body);
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 400;
    font-size: 18px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  :focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 3px;
    border-radius: 1px;
  }

  .home {
    text-align: center;
    max-width: 520px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.9s ease forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .portrait-frame {
    width: 220px;
    height: 293px;
    border-radius: 2px;
    overflow: hidden;
    box-shadow: 0 30px 70px -25px rgba(26,29,36,0.35);
    margin: 0 auto 44px;
    background: #b5a887;
  }
  .portrait-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.92) contrast(1.02);
  }

  .titles {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    white-space: nowrap;
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.02;
    letter-spacing: -0.01em;
    margin-bottom: 48px;
  }

  .profile-link {
    display: inline-block;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--ink);
    transition: color 0.2s, border-color 0.2s;
    cursor: pointer;
  }
  .profile-link:hover {
    color: var(--gold-text);
    border-color: var(--gold-text);
  }
  .profile-link .arrow {
    color: var(--gold-text);
    margin-left: 6px;
    transition: transform 0.3s;
    display: inline-block;
  }
  .profile-link:hover .arrow {
    transform: translateX(4px);
  }

  /* Password overlay */
  .pw-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 29, 36, 0.6);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .pw-overlay.visible {
    display: flex;
    opacity: 1;
  }

  .pw-box {
    background: var(--cream);
    padding: 48px 44px 40px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 30px 80px -20px rgba(26,29,36,0.45);
    border: 1px solid var(--rule);
    transform: translateY(12px);
    transition: transform 0.3s ease;
  }
  .pw-overlay.visible .pw-box {
    transform: translateY(0);
  }

  .pw-box .pw-label {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .pw-input-wrap {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
  }

  .pw-input {
    flex: 1;
    padding: 12px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    color: var(--ink);
    background: white;
    border: 1px solid var(--rule);
    border-right: none;
    outline: none;
    letter-spacing: 0.1em;
  }
  .pw-input:focus {
    border-color: var(--gold);
  }
  .pw-input::placeholder {
    color: var(--rule);
    letter-spacing: 0.05em;
  }

  .pw-submit {
    padding: 12px 20px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cream);
    background: var(--ink);
    border: 1px solid var(--ink);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    min-width: 44px;
    min-height: 44px;
  }
  .pw-submit:hover {
    background: var(--gold-text);
    border-color: var(--gold-text);
  }

  .pw-error {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: #9B4D4D;
    min-height: 24px;
    margin-bottom: 8px;
  }

  .pw-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: none;
    border: none;
    font-size: 24px;
    color: var(--muted);
    cursor: pointer;
    padding: 8px;
    line-height: 1;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pw-close:hover { color: var(--ink); }

  @media (max-width: 600px) {
    .name { font-size: 48px; }
    .portrait-frame { width: 180px; height: 240px; }
    .pw-box { padding: 36px 24px 32px; margin: 0 16px; }
  }
</style>
</head>
<body>

<div class="home">
  <div class="portrait-frame">
    <img src="franz-rembart.jpg" alt="Portrait of Franz Rembart">
  </div>
  <div class="titles">Consulting Partner · Professor · Mathematician</div>
  <h1 class="name">Franz Rembart</h1>
  <a class="profile-link" id="profileLink" role="button" tabindex="0">Detailed profile <span class="arrow">&rarr;</span></a>
</div>

<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <button class="pw-close" id="pwClose" aria-label="Close">&times;</button>
    <div class="pw-label">Enter password</div>
    <div class="pw-input-wrap">
      <input type="password" class="pw-input" id="pwInput" placeholder="Password" autocomplete="off">
      <button class="pw-submit" id="pwSubmit">Go</button>
    </div>
    <div class="pw-error" id="pwError"></div>
  </div>
</div>

<script>
  var overlay = document.getElementById('pwOverlay');
  var input = document.getElementById('pwInput');
  var error = document.getElementById('pwError');

  document.getElementById('profileLink').addEventListener('click', function () {
    overlay.classList.add('visible');
    setTimeout(function () { input.focus(); }, 100);
  });

  document.getElementById('pwClose').addEventListener('click', function () {
    overlay.classList.remove('visible');
    input.value = '';
    error.textContent = '';
  });

  overlay.addEventListener('click', function (e) {
    if (e.target === overlay) {
      overlay.classList.remove('visible');
      input.value = '';
      error.textContent = '';
    }
  });

  function tryPassword() {
    if (input.value === 'mathematics') {
      sessionStorage.setItem('fr_auth', 'granted');
      window.location.href = 'profile.html';
    } else {
      error.textContent = 'Incorrect password.';
      input.value = '';
      input.focus();
    }
  }

  document.getElementById('pwSubmit').addEventListener('click', tryPassword);
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') tryPassword();
  });
</script>

</body>
</html>
